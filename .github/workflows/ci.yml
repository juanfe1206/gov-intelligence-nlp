name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gov_intelligence_nlp_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d gov_intelligence_nlp_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/gov_intelligence_nlp_ci
      DATABASE_SYNC_URL: postgresql://postgres:postgres@localhost:5432/gov_intelligence_nlp_ci
      OPENAI_API_KEY: ci-placeholder-key
      APP_ENV: ci
      RUN_DB_TESTS: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Import check (no runtime)
        run: |
          python -c "import main; from app.main import app; print(app.title)"

      - name: Ensure pgvector extension is enabled
        run: |
          python - <<'PY'
          import os
          import psycopg2

          dsn = os.environ["DATABASE_SYNC_URL"]
          conn = psycopg2.connect(dsn)
          conn.autocommit = True
          cur = conn.cursor()
          cur.execute('CREATE EXTENSION IF NOT EXISTS "vector"')
          cur.execute("SELECT EXISTS (SELECT 1 FROM pg_extension WHERE extname = 'vector')")
          enabled = cur.fetchone()[0]
          cur.close()
          conn.close()
          if not enabled:
              raise SystemExit("pgvector extension is not enabled")
          print("pgvector extension enabled")
          PY

      - name: Run tests
        run: |
          pytest -q

